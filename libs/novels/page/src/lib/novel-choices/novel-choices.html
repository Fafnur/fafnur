@if ($choices().length > 0) {
  <ul class="flex flex-col gap-1 border-l-2 border-yellow-600 pl-6">
    @for (choice of $choices(); track choice.index) {
      <li>
        <button
          class="group flex items-baseline gap-2 w-full py-2 text-left text-gray-700 dark:text-gray-300 hover:text-yellow-600 dark:hover:text-yellow-400 transition-colors cursor-pointer"
          type="button"
          (click)="onChoose(choice.index)"
        >
          <span class="text-yellow-600 opacity-0 group-hover:opacity-100 transition-opacity select-none shrink-0"
            >›</span
          >
          <span>{{ choice.text }}</span>
        </button>
      </li>
    }
  </ul>
} @else {
  <div>
    <button fafnurButton type="button" (click)="onReset()" i18n="Novel|Reset">Play the&nbsp;adventure again?</button>
  </div>
}
