<div class="story">
  @for (line of $lines(); track line.id) {
    <p>{{ line.text }}</p>
  }
</div>

@if ($hasChoices()) {
  <ul class="list-disc">
    @for (choice of $choices(); track choice.index) {
      <li>
        <button class="underline cursor-pointer" type="button" (click)="choose(choice.index)">
          {{ choice.text }}
        </button>
      </li>
    }
  </ul>
} @else {
  <p>End of story</p>
}
