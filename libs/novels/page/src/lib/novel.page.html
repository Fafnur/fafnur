<fafnur-novel-exit />

<!-- Mobile layout -->
<div class="flex flex-col flex-1 md:hidden min-h-0 overflow-hidden">
  <!-- Header: image -->
  <div class="relative w-full aspect-video bg-gray-100 dark:bg-gray-800 shrink-0 overflow-hidden">
    <div class="w-full h-full flex items-center justify-center text-gray-300 dark:text-gray-600">
      <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
    </div>
  </div>

  @if ($loaded()) {
    <!-- Tabs -->
    <div class="flex shrink-0 border-b border-gray-200 dark:border-gray-700">
      <button
        type="button"
        class="flex-1 py-3 text-sm font-medium transition-colors border-b-2"
        [class.border-yellow-600]="$activeTab() === 'current'"
        [class.text-yellow-600]="$activeTab() === 'current'"
        [class.border-transparent]="$activeTab() !== 'current'"
        [class.text-gray-500]="$activeTab() !== 'current'"
        (click)="onTabChange('current')"
        i18n="Novel|Tab dialog"
      >
        Диалог
      </button>
      <button
        type="button"
        class="flex-1 py-3 text-sm font-medium transition-colors border-b-2"
        [class.border-yellow-600]="$activeTab() === 'history'"
        [class.text-yellow-600]="$activeTab() === 'history'"
        [class.border-transparent]="$activeTab() !== 'history'"
        [class.text-gray-500]="$activeTab() !== 'history'"
        (click)="onTabChange('history')"
        i18n="Novel|Tab history"
      >
        История
      </button>
    </div>

    <!-- Tab content -->
    <div class="flex-1 overflow-y-auto p-4 min-h-0">
      @if ($activeTab() === 'current') {
        <div class="flex flex-col gap-6">
          <fafnur-novel-current />
          <fafnur-novel-choices />
        </div>
      } @else {
        <fafnur-novel-history />
      }
    </div>
  } @else {
    <div
      class="flex-1 flex items-center justify-center text-gray-500 dark:text-gray-400 animate-pulse"
      i18n="Novel|Loading"
    >
      Loading…
    </div>
  }
</div>

<!-- Desktop layout -->
<div class="hidden md:grid md:grid-cols-5 flex-1 min-h-0 overflow-hidden">
  <!-- Left column: image (60%) -->
  <div class="col-span-3 relative bg-gray-100 dark:bg-gray-800 overflow-hidden">
    <div class="w-full h-full flex items-center justify-center text-gray-300 dark:text-gray-600">
      <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
    </div>
  </div>

  <!-- Right column: dialog (40%) -->
  <div class="col-span-2 flex flex-col min-h-0 overflow-hidden border-l border-gray-200 dark:border-gray-700">
    @if ($loaded()) {
      <!-- History: 50% -->
      <div class="flex-1 overflow-hidden p-6 min-h-0 border-b border-gray-200 dark:border-gray-700">
        <fafnur-novel-history />
      </div>
      <!-- Current + Choices: 50% -->
      <div class="flex-1 overflow-y-auto p-6 min-h-0 flex flex-col gap-6">
        <fafnur-novel-current />
        <fafnur-novel-choices />
      </div>
    } @else {
      <div
        class="flex-1 flex items-center justify-center text-gray-500 dark:text-gray-400 animate-pulse"
        i18n="Novel|Loading"
      >
        Loading…
      </div>
    }
  </div>
</div>
