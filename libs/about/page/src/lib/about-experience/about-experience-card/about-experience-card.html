<div class="relative pl-8 pb-8 last:pb-0">
  <!-- dot -->
  <div
    class="absolute left-0 top-1.5 -translate-x-1/2 w-3 h-3 rounded-full bg-yellow-500 dark:bg-yellow-400 ring-4 ring-white dark:ring-yellow-950"
  ></div>

  <div
    class="flex flex-col gap-2 rounded-2xl border border-yellow-100 dark:border-yellow-800 bg-yellow-50 dark:bg-yellow-950 p-5 shadow-sm hover:shadow-md transition-shadow"
  >
    <!-- header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
      <span class="font-semibold text-yellow-900 dark:text-white text-base" [innerHTML]="$experience().company"></span>
      <span class="text-xs text-yellow-400 dark:text-yellow-200 whitespace-nowrap">
        {{ $experience().start }} — {{ $experience().end }}
        <span
          class="ml-1 px-2 py-0.5 rounded-full bg-yellow-100 dark:bg-yellow-800 text-yellow-500 dark:text-yellow-200"
          >{{ $experience().time }}</span
        >
      </span>
    </div>
    <!-- post -->
    <span class="text-sm font-medium text-yellow-600 dark:text-yellow-200">{{ $experience().post }}</span>
    <!-- description -->
    @if ($experience().description.length) {
      <ul class="flex flex-col gap-1 mt-1">
        @for (desc of $experience().description; track desc) {
          <li class="flex gap-2 text-sm text-yellow-600 dark:text-yellow-200">
            <span class="mt-1.5 w-1 h-1 min-w-1 rounded-full bg-yellow-400 dark:bg-yellow-600"></span>
            {{ desc }}
          </li>
        }
      </ul>
    }
  </div>
</div>
